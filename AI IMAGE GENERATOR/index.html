<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Image Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>AI Image Generator</h1>

    <input id="prompt" type="text" placeholder="Enter your prompt..." />
    <button onclick="generateImage()">Generate Image</button>

    <p id="status"></p>

    <div class="image-box">
      <img id="image" />
    </div>

    <!-- 🔥 Download Button -->
    <button id="downloadBtn" onclick="downloadImage()" style="display:none;">
      Download Image
    </button>

  </div>

  <script src="script.js"></script>
</body>
</html>
